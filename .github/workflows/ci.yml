name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Build Linux Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ cppcheck

      # NOTE: Protobuf code generation is intentionally skipped.
      # The gateway uses hand-rolled decoders (protobuf_lite.c) for safety-critical
      # embedded systems - avoids external code generation dependencies.

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DBUILD_LINUX=ON -DBUILD_MCU=OFF -DBUILD_TESTS=ON
          make -j$(nproc)

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure

  build-mcu:
    name: Build MCU Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake

      # NOTE: nanopb code generation is intentionally skipped.
      # The MCU firmware uses hand-rolled protobuf encoder/decoder (protobuf_handler.c)
      # for deterministic behavior in safety-critical embedded systems.

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DBUILD_LINUX=OFF -DBUILD_MCU=ON -DBUILD_TESTS=OFF \
            -DCMAKE_TOOLCHAIN_FILE=../config/arm-none-eabi.cmake
          make -j$(nproc)

  static-analysis:
    name: MISRA Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingInclude \
            --xml --xml-version=2 \
            src/linux/ src/mcu/ 2> cppcheck-report.xml

      - name: Check for errors
        run: |
          if grep -q 'severity="error"' cppcheck-report.xml; then
            echo "❌ Static analysis found errors"
            grep 'severity="error"' cppcheck-report.xml
            exit 1
          fi
          echo "✅ No static analysis errors"

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

  traceability:
    name: Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate traceability matrix
        run: python3 tools/scripts/generate_traceability.py

      - name: Check for orphans
        run: |
          if grep -q "❌ MISSING" docs/traceability/full_traceability_matrix.md; then
            echo "⚠️ Traceability gaps found"
            grep "❌ MISSING" docs/traceability/full_traceability_matrix.md
          else
            echo "✅ Full traceability coverage"
          fi

      - name: Upload matrix
        uses: actions/upload-artifact@v4
        with:
          name: traceability-matrix
          path: docs/traceability/full_traceability_matrix.md
