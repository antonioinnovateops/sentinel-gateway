version: "3.8"

services:
  build-linux:
    build:
      context: .
      dockerfile: docker/Dockerfile.build-linux
    volumes:
      - ./build/linux:/workspace/output
    network_mode: none

  build-mcu:
    build:
      context: .
      dockerfile: docker/Dockerfile.build-mcu
    volumes:
      - ./build/mcu:/workspace/output
    network_mode: none

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile.build-linux
    volumes:
      - ./tests:/workspace/tests:ro
    network_mode: none
    command: >
      bash -c "
        cd /workspace &&
        cmake -B build-test -DBUILD_TESTS=ON -DBUILD_LINUX=OFF -DBUILD_MCU=OFF &&
        cmake --build build-test &&
        ctest --test-dir build-test --output-on-failure
      "

  analysis:
    build:
      context: .
      dockerfile: docker/Dockerfile.analysis
    volumes:
      - .:/workspace/src:ro
      - ./results/analysis:/workspace/output
    user: root
    depends_on:
      build-linux:
        condition: service_completed_successfully
      build-mcu:
        condition: service_completed_successfully
    command: >-
      bash -c "echo '=== MISRA Analysis ===' &&
      cppcheck --enable=all --std=c11 --suppress=missingIncludeSystem
      /workspace/src/src/common/ /workspace/src/src/linux/ /workspace/src/src/mcu/
      --xml 2>/workspace/output/cppcheck.xml &&
      echo '=== Analysis Complete ==='"

  sil:
    build:
      context: .
      dockerfile: docker/Dockerfile.sil
    volumes:
      - ./build/linux:/workspace/artifacts/linux:ro
      - ./build/mcu:/workspace/artifacts/mcu:ro
      - ./tests:/workspace/tests:ro
      - ./src:/workspace/src:ro
      - ./CMakeLists.txt:/workspace/CMakeLists.txt:ro
      - ./config:/workspace/config:ro
      - ./cmake:/workspace/cmake:ro
      - ./results/sil:/workspace/results
    privileged: true
    environment:
      - PROJECT_ROOT=/workspace
    depends_on:
      build-linux:
        condition: service_completed_successfully
      build-mcu:
        condition: service_completed_successfully
    user: root
    command: >-
      bash -c "echo '=== SIL Integration Tests ===' &&
      echo 'Test plan: ITP-001 (docs/test/integration_test_spec/)' &&
      cd /workspace/tests/integration &&
      python3 -m pytest test_sil.py -v --timeout=60 --junitxml=/workspace/results/sil-results.xml"

  build-mcu-qemu:
    build:
      context: .
      dockerfile: docker/Dockerfile.build-mcu-qemu
    volumes:
      - ./build/qemu-mcu:/workspace/output
    network_mode: none

  qemu-sil:
    build:
      context: .
      dockerfile: docker/Dockerfile.qemu-sil
    volumes:
      - ./build/linux:/workspace/artifacts/linux:ro
      - ./build/qemu-mcu:/workspace/artifacts/mcu-qemu:ro
      - ./tests:/workspace/tests:ro
      - ./results/qemu-sil:/workspace/results
      - ./CMakeLists.txt:/workspace/CMakeLists.txt:ro
      - ./config:/workspace/config:ro
      - ./cmake:/workspace/cmake:ro
      - ./src:/workspace/src:ro
    depends_on:
      build-linux:
        condition: service_completed_successfully
      build-mcu-qemu:
        condition: service_completed_successfully
    command: >-
      bash -c "echo '=== QEMU SIL Test Environment ===' &&
      echo 'MCU: ARM Linux ELF via qemu-arm-static (user-mode)' &&
      echo 'Gateway: Native x86_64 or qemu-aarch64-static' &&
      cd /workspace/tests/qemu &&
      python3 -m pytest test_qemu_sil.py -v --timeout=120 --junitxml=/workspace/results/qemu-sil-results.xml"

volumes:
  build-cache-linux:
  build-cache-mcu:
